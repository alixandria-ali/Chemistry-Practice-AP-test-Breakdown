## Unit: Unit 8 - Acids and Bases
**Topic**: Bronsted-Lowry Acid-Base Theory (SAP-8.A)

---

## Original Question
Which sentence is true of all Bronsted-Lowry bases?

A. They can donate a hydrogen ion.
B. They can accept a hydrogen ion.
C. They can produce hydronium.
D. They are positively charged.
E. They are negatively charged.

---

## How to Approach This Question

### Step 1: Recall Bronsted-Lowry Definitions

**Bronsted-Lowry Acid**: A substance that **donates** a proton (H⁺ ion)
**Bronsted-Lowry Base**: A substance that **accepts** a proton (H⁺ ion)

**Key Memory Aid:**
- **A**cid = **A**way (gives away H⁺)
- **B**ase = **B**rings in (accepts H⁺)

---

### Step 2: Evaluate Each Option

**A. They can donate a hydrogen ion.**
- ❌ This is the definition of an **acid**, not a base
- Acids donate H⁺

**B. They can accept a hydrogen ion.**
- ✅ This is the exact definition of a Bronsted-Lowry base
- Bases accept H⁺

**C. They can produce hydronium.**
- ❌ Acids produce hydronium (H₃O⁺) when they donate H⁺ to water
- Example: HCl + H₂O → H₃O⁺ + Cl⁻

**D. They are positively charged.**
- ❌ Not all bases are positively charged
- Examples: NH₃ (neutral), OH⁻ (negative), Na⁺ (positive but not a base)

**E. They are negatively charged.**
- ❌ Not all bases are negatively charged
- While OH⁻ is negative, NH₃ is a base but is neutral

**Answer: B (They can accept a hydrogen ion.)**

---

## Key Concepts to Remember

### Bronsted-Lowry Theory

| Type | Definition | Action | Example |
|------|------------|--------|---------|
| **Acid** | Proton donor | Gives away H⁺ | HCl, H₂SO₄, NH₄⁺ |
| **Base** | Proton acceptor | Accepts H⁺ | NH₃, OH⁻, H₂O |

### Important Points:
1. **Charge doesn't determine acid/base behavior**
   - NH₄⁺ is an acid (can donate H⁺)
   - OH⁻ is a base (can accept H⁺)
   - NH₃ is a base (neutral, can accept H⁺)

2. **Water can be both** (amphoteric):
   - As acid: H₂O → H⁺ + OH⁻
   - As base: H₂O + H⁺ → H₃O⁺

3. **Conjugate acid-base pairs**:
   - When a base accepts H⁺, it becomes its conjugate acid
   - When an acid donates H⁺, it becomes its conjugate base

### Example Reaction:
```
NH₃  +  HCl  →  NH₄⁺  +  Cl⁻
base   acid    conj.acid  conj.base
```

---

## Try It Now!

**Practice Question:**

In the following reaction, identify the Bronsted-Lowry base:

HNO₃ + H₂O → H₃O⁺ + NO₃⁻

A. HNO₃
B. H₂O
C. H₃O⁺
D. NO₃⁻
E. There is no base in this reaction

---

## Check Yourself

### Your Answer: ____

### Feedback

**Approach:**
1. Identify which species **accepts** a proton (H⁺)
2. That species is the Bronsted-Lowry base
3. Track where the H⁺ goes

**Analysis:**

Let's track the hydrogen atoms:
- **HNO₃** starts with 1 H → becomes **NO₃⁻** with 0 H
  - Lost H⁺ → **ACID** (proton donor)

- **H₂O** starts with 2 H → becomes **H₃O⁺** with 3 H  
  - Gained H⁺ → **BASE** (proton acceptor)

**Correct Answer: B (H₂O)**

Water acts as a Bronsted-Lowry base in this reaction because it accepts a proton from nitric acid. The water molecule uses one of its lone pairs on oxygen to bond with the H⁺, forming hydronium ion (H₃O⁺).

**The complete picture:**
- HNO₃ = acid (donates H⁺)
- H₂O = base (accepts H⁺)
- H₃O⁺ = conjugate acid of H₂O
- NO₃⁻ = conjugate base of HNO₃

**Key Insight:**
This reaction shows that water can act as a base even though we often think of it as neutral. When water accepts a proton from a strong acid like HNO₃, it demonstrates basic behavior according to Bronsted-Lowry theory.
